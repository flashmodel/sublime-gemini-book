title: A Sublime Dive into Gemini CLI
description: Master Gemini CLI using Sublime Text

url: "https://gemini.termmate.app"
baseurl: ""

# Theme configuration
remote_theme: just-the-docs/just-the-docs

# Enable search
search_enabled: true
search:
  tokenizer_separator: /[\s/]+/
  rel_url: true

# Navigation configuration
aux_links:
  "GitHub":
    - https://github.com/flashmodel/using-sublime-gemini
  "Explore TermMate":
    - https://termmate.app

# Footer content
footer_content: "Copyright &copy; 2024 flashmodel. Distributed by an MIT license."

# Just the Docs specific settings
heading_anchors: true
color_scheme: "light"
back_to_top: true
back_to_top_text: "Back to top"

# Custom CSS
custom_css: ["assets/css/custom.css"]
